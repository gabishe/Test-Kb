<style>
:root{
  --bg:#0E0E11;
  --bg-elevated:#17171B;
  --card:#1C1C21;
  --card-border:#2E2E36;
  --steel:#5B6B95;
  --steel-bright:#8593C4;
  --brass:#B8912E;
  --brass-bright:#E8C866;
  --ember:#7A2734;
  --ember-bright:#C23B4E;
  --text:#F3EFE4;
  --muted:#93909C;
  --success:#2F7A5C;
  --success-bright:#4FBA8C;
  --gold:#D4AF37;
  --radius:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
svg{vertical-align:middle;flex:none;}
html,body{margin:0;padding:0;
  background:radial-gradient(ellipse 900px 500px at 50% -10%, rgba(212,175,55,0.09), transparent 60%), var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  overscroll-behavior-y:none;}
body{padding-bottom:env(safe-area-inset-bottom);}
h1,h2,h3{margin:0;font-weight:800;letter-spacing:-0.02em;text-transform:uppercase;}
p{margin:0;}
button{font-family:inherit;border:none;cursor:pointer;}
#app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;}
#app.view-fade{animation:view-fade-in 0.28s ease;}
@keyframes view-fade-in{0%{opacity:0;transform:translateY(8px);}100%{opacity:1;transform:translateY(0);}}

/* ---------- top bar ---------- */
.topbar{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,var(--bg) 70%,rgba(22,20,18,0));
  padding:calc(env(safe-area-inset-top) + 14px) 18px 16px;display:flex;align-items:center;gap:12px;}
.back-btn{width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--card-border);
  color:var(--text);display:flex;align-items:center;justify-content:center;font-size:18px;flex:none;}
.topbar-title{flex:1;min-width:0;}
.topbar-title .eyebrow{font-size:11px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;font-weight:700;}
.topbar-title h1{font-size:19px;}

/* ---------- home ---------- */
.brand{padding:6px 18px 22px;}
.brand .eyebrow{color:var(--brass);font-size:12px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;}
.brand h1{font-size:32px;line-height:1.02;margin-top:6px;
  background:linear-gradient(135deg,var(--text) 40%,var(--brass-bright) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;}
.brand p{color:var(--muted);margin-top:10px;font-size:14.5px;line-height:1.5;}

.session-list{padding:0 18px 90px;display:flex;flex-direction:column;gap:12px;}

.progress-wrap{padding:0 18px 22px;}
.progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.progress-top .pct{font-size:22px;font-weight:800;color:var(--brass-bright);}
.progress-top .lbl{color:var(--muted);font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;}
.progress-track{height:14px;border-radius:8px;background:var(--card);border:1px solid var(--card-border);overflow:hidden;}
.progress-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--steel),var(--brass) 55%,var(--ember-bright));
  transition:width 0.4s ease;}
.streak-wrap{padding:0 18px 22px;}
.streak-label{color:var(--muted);font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
.streak-grid{display:flex;gap:5px;justify-content:space-between;}
.streak-col{display:flex;flex-direction:column;gap:5px;}
.streak-cell{width:13px;height:13px;border-radius:4px;background:var(--card);border:1px solid var(--card-border);}
.streak-cell.on{background:var(--success-bright);border-color:var(--success-bright);}

.tab-bar{position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;background:var(--bg-elevated);
  border-top:1px solid var(--card-border);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:30;}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:11px 0 9px;color:var(--muted);
  background:transparent;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;}
.tab-btn .tab-icon{font-size:19px;line-height:1;}
.tab-btn.active{color:var(--brass-bright);}

.tab-bar{position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;background:var(--bg-elevated);
  border-top:1px solid var(--card-border);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:30;}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:11px 0 9px;color:var(--muted);
  background:transparent;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;}
.tab-btn .tab-icon{font-size:19px;line-height:1;}
.tab-btn.active{color:var(--brass-bright);}

.fullkb-wrap{padding:36px 24px 100px;display:flex;flex-direction:column;align-items:center;text-align:center;flex:1;}
.fullkb-eyebrow{color:var(--brass);font-size:12px;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;}
.fullkb-title{font-size:40px;margin-top:6px;}
.fullkb-ring-box{position:relative;width:230px;height:230px;margin-top:28px;}
.fullkb-ring-box svg{width:100%;height:100%;transform:rotate(-90deg);}
.fullkb-pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.fullkb-pct .n{font-size:48px;font-weight:800;font-variant-numeric:tabular-nums;}
.fullkb-pct .l{color:var(--muted);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-top:4px;}
.fullkb-sub{color:var(--muted);font-size:13.5px;margin-top:20px;line-height:1.5;max-width:280px;}
.fullkb-tracks{display:flex;gap:10px;margin-top:26px;width:100%;}
.fullkb-track-card{flex:1;background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:14px 10px;}
.fullkb-track-card .tn{font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:0.08em;}
.fullkb-track-card .tv{font-size:22px;font-weight:800;margin-top:4px;}

.week-section{}
.week-header{display:flex;align-items:center;justify-content:space-between;background:var(--card);
  box-shadow:0 4px 14px rgba(0,0,0,0.28);
  border:1px solid var(--card-border);border-radius:14px;padding:15px 16px;}
.week-header .wh-title{font-weight:800;font-size:16px;text-transform:uppercase;letter-spacing:0.02em;}
.week-header .wh-sub{color:var(--muted);font-size:12px;margin-top:2px;text-transform:none;letter-spacing:0;font-weight:600;}
.week-header .wh-chevron{color:var(--brass-bright);font-size:20px;font-weight:800;transition:transform 0.2s ease;flex:none;}
.week-header.open .wh-chevron{transform:rotate(90deg);}
.week-header.all-done{border-color:rgba(122,155,92,0.5);}
.week-body{padding:12px 2px 2px;display:flex;flex-direction:column;gap:10px;}

.session-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);
  box-shadow:0 6px 18px rgba(0,0,0,0.3);transition:transform 0.15s ease;
  padding:16px;position:relative;overflow:hidden;}
.session-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--brass);}
.session-card.done::before{background:var(--success);}
.session-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.session-code{font-size:11px;font-weight:800;letter-spacing:0.14em;color:var(--brass);text-transform:uppercase;}
.session-card h2{font-size:20px;margin-top:2px;}
.session-sub{color:var(--muted);font-size:13px;margin-top:4px;}
.done-pill{display:flex;align-items:center;gap:5px;background:rgba(122,155,92,0.15);color:var(--success-bright);
  font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:100px;white-space:nowrap;}
.done-col{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.reset-mini{background:transparent;color:var(--muted);font-size:11px;font-weight:700;border:1px solid var(--card-border);
  border-radius:100px;padding:4px 9px;white-space:nowrap;}
.reset-mini:active{color:var(--ember-bright);border-color:var(--ember);}
.session-blocks{display:flex;gap:6px;margin-top:12px;}
.session-blocks span{width:24px;height:24px;border-radius:7px;background:var(--bg-elevated);color:var(--muted);

/* ===================== SOUND / HAPTICS ===================== */
let audioCtx = null;
function tone(freq, dur, delay=0){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const t0 = audioCtx.currentTime + delay;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(0.35, t0+0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0+dur+0.03);
  }catch(e){}
}
const beeper = {
  start(){ tone(880,0.16); if(navigator.vibrate) navigator.vibrate(120); },
  mid(){ tone(660,0.12); tone(660,0.12,0.22); if(navigator.vibrate) navigator.vibrate([80,60,80]); },
  end(){ tone(523,0.14); tone(659,0.14,0.17); tone(784,0.22,0.34); if(navigator.vibrate) navigator.vibrate([150,80,150,80,300]); }
};

/* ===================== STORAGE ===================== */
// Uses Claude's window.storage when previewed inside Claude, and falls back
// to plain localStorage when opened standalone (downloaded file / installed PWA)
// so progress is saved either way.
async function storageGet(key){
  try{
    if(window.storage){
      const r = await window.storage.get(key, false);
      return r ? r.value : null;
    }
  }catch(e){}
  try{ return localStorage.getItem(key); }catch(e){ return null; }
}
async function storageSet(key, value){
  try{
    if(window.storage){ await window.storage.set(key, value, false); return; }
  }catch(e){}
  try{ localStorage.setItem(key, value); }catch(e){}
}
async function storageDelete(key){
  try{
    if(window.storage){ await window.storage.delete(key, false); return; }
  }catch(e){}
  try{ localStorage.removeItem(key); }catch(e){}
}
async function getCompletion(sessionId){
  const v = await storageGet('completed:'+sessionId);
  try{ return v ? JSON.parse(v) : null; }catch(e){ return null; }
}
async function setCompletion(sessionId, iso){
  await storageSet('completed:'+sessionId, JSON.stringify(iso));
}
async function resetCompletion(sessionId){
  await storageDelete('completed:'+sessionId);
  delete completions[sessionId];
}

/* ---- Exercise history / PR logging ---- */
function exKey(name){
  return name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
}
async function logSet(name, weight, reps){
  const key = 'elog:'+exKey(name);
  let arr = [];
  try{ const raw = await storageGet(key); arr = raw?JSON.parse(raw):[]; }catch(e){ arr=[]; }
  const today = new Date().toISOString().slice(0,10);
  let todayEntry = arr.find(e=>e.d===today);
  if(!todayEntry){ todayEntry = {d:today, sets:[]}; arr.push(todayEntry); }
  todayEntry.sets.push({w:weight, r:reps});
  if(arr.length>15) arr = arr.slice(arr.length-15);
  await storageSet(key, JSON.stringify(arr));

  try{
    const idx = await getExerciseIndex();
    if(!idx.find(e=>e.key===exKey(name))){
      idx.push({key:exKey(name), name});
      await storageSet('exercise-index', JSON.stringify(idx));
    }
  }catch(e){}

  const prKey = 'pr:'+exKey(name);
  let pr = null;
  try{ const raw = await storageGet(prKey); pr = raw?JSON.parse(raw):null; }catch(e){}
  const est = weight*(1+reps/30);
  let isPR = false;
  if(!pr || est > pr.e1rm){
    pr = { w:weight, r:reps, e1rm:Math.round(est*10)/10, d:today };
    await storageSet(prKey, JSON.stringify(pr));
    isPR = true;
  }
  return { isPR, pr };
}
async function getExerciseLog(name){
  try{ const raw = await storageGet('elog:'+exKey(name)); return raw?JSON.parse(raw):[]; }catch(e){ return []; }
}
async function getLastSet(name){
  const arr = await getExerciseLog(name);
  if(!arr.length) return null;
  const last = arr[arr.length-1];
  return last.sets[last.sets.length-1] || null;
}
async function getPR(name){
  try{ const raw = await storageGet('pr:'+exKey(name)); return raw?JSON.parse(raw):null; }catch(e){ return null; }
}

/* ---- Real exercise photos (user-supplied, stored locally) ---- */
function photoKey(name){ return 'photo:'+exKey(name); }
async function getPhoto(name){ try{ return await storageGet(photoKey(name)); }catch(e){ return null; } }
async function setPhoto(name, dataUrl){ await storageSet(photoKey(name), dataUrl); }
async function removePhoto(name){ await storageDelete(photoKey(name)); }

function compressImageFile(file, maxSize=240){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        const canvas = document.createElement('canvas');
        const scale = Math.min(1, maxSize/Math.max(img.width, img.height));
        canvas.width = Math.round(img.width*scale);
        canvas.height = Math.round(img.height*scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function triggerPhotoPicker(name, thumbEl){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.capture = 'environment';
  input.onchange = async ()=>{
    if(!input.files[0]) return;
    try{
      const dataUrl = await compressImageFile(input.files[0]);
      await setPhoto(name, dataUrl);
      applyPhotoToThumb(thumbEl, dataUrl);
    }catch(e){}
  };
  input.click();
}
function applyPhotoToThumb(thumbEl, dataUrl){
  let img = thumbEl.querySelector('img.ex-photo');
  if(!img){ img = document.createElement('img'); img.className = 'ex-photo'; thumbEl.insertBefore(img, thumbEl.firstChild); }
  img.src = dataUrl;
  const svg = thumbEl.querySelector('svg'); if(svg) svg.style.display = 'none';
}
function openPhotoMenu(name, thumbEl){
  getPhoto(name).then(photo=>{
    const overlay = el(`
      <div class="confirm-overlay">
        <div class="confirm-box">
          <p>${name}</p>
          <div class="confirm-btn-row" style="flex-direction:column;gap:8px;">
            <button class="btn-primary photo-pick">${photo?'Remplacer la photo':'Ajouter une photo'}</button>
            ${photo?'<button class="btn-secondary photo-remove">Supprimer la photo</button>':''}
            <button class="btn-secondary photo-cancel">Annuler</button>
          </div>
        </div>
      </div>
    `);
    document.body.appendChild(overlay);
    overlay.querySelector('.photo-cancel').onclick = ()=> overlay.remove();
    const removeBtn = overlay.querySelector('.photo-remove');
    if(removeBtn){
      removeBtn.onclick = async ()=>{
        await removePhoto(name);
        overlay.remove();
        const img = thumbEl.querySelector('img.ex-photo');
        if(img) img.remove();
        const svg = thumbEl.querySelector('svg'); if(svg) svg.style.display = '';
      };
    }
    overlay.querySelector('.photo-pick').onclick = ()=>{
      overlay.remove();
      triggerPhotoPicker(name, thumbEl);
    };
  });
}
function wireThumbPhotos(container){
  container.querySelectorAll('.ex-thumb').forEach(thumbEl=>{
    const name = thumbEl.dataset.exname;

    getPhoto(name).then(photo=>{ if(photo) applyPhotoToThumb(thumbEl, photo); });

  });
}

async function logBodyweight(kg){
  let arr = [];
  try{ const raw = await storageGet('bodyweight-log'); arr = raw?JSON.parse(raw):[]; }catch(e){}
  const today = new Date().toISOString().slice(0,10);
  const existing = arr.find(e=>e.d===today);
  if(existing) existing.kg = kg; else arr.push({d:today, kg});
  if(arr.length>60) arr = arr.slice(arr.length-60);

}
async function computeGlobalStats(){
  const idx = await getExerciseIndex();
  let totalVolume = 0, mostTrained = null, mostTrainedCount = -1;
  for(const {key, name} of idx){
    try{
      const raw = await storageGet('elog:'+key);
      const arr = raw?JSON.parse(raw):[];
      let count = 0;
      arr.forEach(e=>e.sets.forEach(s=>{ totalVolume += s.w*s.r; count++; }));
      if(count > mostTrainedCount){ mostTrainedCount = count; mostTrained = name; }
    }catch(e){}
  }
  const slog = await getSessionLog();
  return { totalVolume: Math.round(totalVolume), totalSessions: slog.length, mostTrained, mostTrainedCount: Math.max(mostTrainedCount,0) };
}
function buildStreakWeeks(trainedDatesSet){
  const days = [];
  const today = new Date();
  for(let i=55; i>=0; i--){
    const d = new Date(today); d.setDate(today.getDate()-i);
    const key = d.toISOString().slice(0,10);
    days.push({ date:key, done:trainedDatesSet.has(key) });
  }
  const weeks = [];
  for(let w=0; w<8; w++) weeks.push(days.slice(w*7, (w+1)*7));
  return weeks;
}

  const programSessions = [...program.trackA, ...program.trackB, ...program.trackC];
  const total = programSessions.length;

  const weeks = buildStreakWeeks(trainedDates);
  app.appendChild(el(`

      </div>
    </div>
  `));

  const list = el(`<div class="session-list"></div>`);
  for(let w=1; w<=8; w++){
    const ids=[tracks.A[w-1].id, tracks.B[w-1].id, tracks.C[w-1].id];
    const doneCount = ids.filter(id=>completions[id]).length;
    const isOpen = state.openWeek===w;

/* ===================== COUNTDOWN TIMER COMPONENT ===================== */
function mountCountdown(container, totalSeconds, {onDone, autoStart}={}){
  const R = 54, C = 2*Math.PI*R;
  const box = el(`
    <div class="timer-wrap">
      <div class="timer-ring-box">
        <svg viewBox="0 0 120 120">
          <circle class="ring-bg" cx="60" cy="60" r="${R}"></circle>
          <circle class="ring-progress" cx="60" cy="60" r="${R}" stroke-dasharray="${C}" stroke-dashoffset="0"></circle>
        </svg>
        <div class="timer-center">
          <div class="timer-digits">${fmtTime(totalSeconds)}</div>
          <div class="timer-phase">Prêt</div>
        </div>
      </div>
      <div class="timer-controls">
        <button class="btn-secondary tc-reset">Réinitialiser</button>
        <button class="btn-primary tc-toggle">Démarrer</button>
      </div>
    </div>
  `);
  container.appendChild(box);
  const digits = box.querySelector('.timer-digits');
  const phaseEl = box.querySelector('.timer-phase');
  const ring = box.querySelector('.ring-progress');
  const ringBox = box.querySelector('.timer-ring-box');
  const toggleBtn = box.querySelector('.tc-toggle');
  const resetBtn = box.querySelector('.tc-reset');

  let remaining = totalSeconds;
  let running = false;
  let timerId = null;
  let firedMid = false;
  let firedStartFlag = false;

  function paint(){
    digits.textContent = fmtTime(remaining);
    const progress = 1 - remaining/totalSeconds;
    ring.style.strokeDashoffset = C * (1-progress);
    if(progress < 0.5) ring.style.stroke = 'var(--steel)';
    else if(progress < 0.9) ring.style.stroke = 'var(--brass)';
    else ring.style.stroke = 'var(--ember-bright)';
  }
  function flash(){ ringBox.classList.remove('timer-flash'); void ringBox.offsetWidth; ringBox.classList.add('timer-flash'); }

  function tick(){
    remaining -= 1;
    if(!firedMid && remaining <= Math.floor(totalSeconds/2) && remaining>0){
      firedMid = true; beeper.mid(); flash(); phaseEl.textContent = 'Mi-parcours';
    }
    if(remaining <= 0){
      remaining = 0; paint();
      stop();
      beeper.end(); flash();
      phaseEl.textContent = 'Terminé';
      onDone && onDone();
      return;
    }
    paint();
  }
  function start(){
    if(running) return;
    running = true;
    toggleBtn.textContent = 'Pause';
    if(!firedStartFlag){ firedStartFlag = true; beeper.start(); flash(); phaseEl.textContent = "C'est parti"; }
    else phaseEl.textContent = 'En cours';
    timerId = setInterval(tick, 1000);
  }
  function pause(){
    running = false;
    toggleBtn.textContent = 'Reprendre';
    phaseEl.textContent = 'En pause';
    clearInterval(timerId);
  }
  function stop(){
    running = false;
    toggleBtn.textContent = 'Démarrer';
    clearInterval(timerId);
  }
  function reset(){
    stop();
    remaining = totalSeconds; firedMid=false; firedStartFlag=false;
    phaseEl.textContent = 'Prêt';
    paint();
  }
  toggleBtn.onclick = ()=>{ running ? pause() : start(); };
  resetBtn.onclick = reset;
  paint();
  if(autoStart) start();
  return { start, pause, reset, stop, get remaining(){return remaining;} };
}

function svgSparkline(values){
  if(values.length < 2) return '';
  const w = 260, h = 60;
  const max = Math.max(...values), min = Math.min(...values);
  const range = (max-min) || 1;
  const step = w/(values.length-1);
  const pts = values.map((v,i)=>`${(i*step).toFixed(1)},${(h - ((v-min)/range)*h*0.8 - h*0.1).toFixed(1)}`).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none">
    <polyline points="${pts}" fill="none" stroke="var(--brass-bright)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}
async function openExerciseHistory(name){
  const [log, pr] = await Promise.all([getExerciseLog(name), getPR(name)]);
  const spark = svgSparkline(log.flatMap(e=>e.sets.map(s=> Math.round(s.w*(1+s.r/30)*10)/10)));
  const overlay = el(`
    <div style="position:fixed;inset:0;background:rgba(10,9,8,0.9);z-index:70;display:flex;align-items:center;justify-content:center;padding:24px;">

        </div>` : `<div style="color:var(--muted);font-size:13px;margin-bottom:14px;">Pas encore de données. Renseigne poids et reps à ta prochaine série.</div>`}
        ${spark}
        <div style="display:flex;flex-direction:column;gap:8px;margin-top:14px;">
          ${log.slice().reverse().map(e=>`
            <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;border-bottom:1px solid var(--card-border);padding-bottom:6px;">
              <span style="color:var(--muted);">${e.d}</span>
              <span style="font-weight:700;">${e.sets.map(s=>`${s.w}×${s.r}`).join(' · ')}</span>
            </div>`).join('')}
        </div>
        <button class="btn-secondary hist-close" style="width:100%;margin-top:16px;padding:12px;border-radius:12px;font-weight:800;text-transform:uppercase;font-size:13px;">Fermer</button>
      </div>
    </div>
  `);
  document.body.appendChild(overlay);
  overlay.querySelector('.hist-close').onclick = ()=> overlay.remove();
}

function openRestTimer(min, max, onDone){
  let duration = Math.round((min+max)/2);
  const overlay = el(`
    <div style="position:fixed;inset:0;background:rgba(10,9,8,0.92);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px;">
      <div style="background:var(--card);border:1px solid var(--card-border);border-radius:20px;padding:22px;width:100%;max-width:340px;text-align:center;">
        <div class="eyebrow" style="color:var(--steel-bright);font-size:11.5px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;">Récupération</div>
        <h3 style="font-size:19px;margin-top:4px;">${fmtRange(min,max,'s')} de repos</h3>
        <div class="adj-row" style="display:flex;gap:8px;justify-content:center;margin-top:10px;">
          <button class="adj-minus" style="width:38px;height:38px;border-radius:10px;background:var(--bg-elevated);border:1px solid var(--card-border);color:var(--text);font-weight:800;">−15</button>
          <button class="adj-plus" style="width:38px;height:38px;border-radius:10px;background:var(--bg-elevated);border:1px solid var(--card-border);color:var(--text);font-weight:800;">+15</button>
        </div>
        <div class="rest-mount"></div>
        <button class="btn-secondary rt-skip" style="width:100%;margin-top:6px;padding:13px;border-radius:12px;font-weight:800;text-transform:uppercase;font-size:13px;">Passer le repos</button>
      </div>
    </div>
  `);
  document.body.appendChild(overlay);
  const mount = overlay.querySelector('.rest-mount');
  mountCountdown(mount, duration, { onDone: finish, autoStart:true });
  function rebuild(){
    mount.innerHTML='';
    mountCountdown(mount, duration, { onDone: finish, autoStart:true });
  }
  overlay.querySelector('.adj-minus').onclick = ()=>{ duration = Math.max(15, duration-15); rebuild(); };
  overlay.querySelector('.adj-plus').onclick = ()=>{ duration = duration+15; rebuild(); };
  function finish(){ overlay.remove(); onDone && onDone(); }
  overlay.querySelector('.rt-skip').onclick = finish;
}

  if(!state.blockState[key]) state.blockState[key] = { duration:b.durationMin*60, started:false, rounds:0, done:false };

  const list = el(`<div class="ex-list"></div>`);
  b.items.forEach(it=>{
    list.appendChild(el(`<div class="ex-row">${thumb(it.name)}<div class="ex-name">${it.name}</div><div class="ex-detail">${it.detail}</div>${ytLink(it.name)}</div>`));
  });
  container.appendChild(list);
  wireThumbPhotos(list);
  container.appendChild(el(`<div style="text-align:center;color:var(--brass-bright);font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:0.08em;margin-top:10px;">→ Un tour validé</div>`));

  if(b.splitNote) container.appendChild(el(`<div class="block-note" style="margin-top:10px;">${b.splitNote}</div>`));
  if(b.loadNote) container.appendChild(el(`<div class="block-note" style="margin-top:10px;">${b.loadNote}</div>`));

  const mount = el(`<div></div>`);
  container.appendChild(mount);

  if(!st.started){
    const wrap = el(`
      <div style="text-align:center;margin-top:18px;">
        <div style="color:var(--muted);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Durée (${b.durationMin} à ${b.durationMax}')</div>
        <div style="display:flex;gap:14px;align-items:center;justify-content:center;">
          <button class="dur-minus" style="width:44px;height:44px;border-radius:12px;background:var(--card);border:1px solid var(--card-border);color:var(--text);font-weight:800;font-size:18px;">−</button>
          <div style="font-size:26px;font-weight:800;min-width:60px;" class="dur-val">${Math.round(st.duration/60)}'</div>
          <button class="dur-plus" style="width:44px;height:44px;border-radius:12px;background:var(--card);border:1px solid var(--card-border);color:var(--text);font-weight:800;font-size:18px;">+</button>
        </div>
        <button class="btn-primary mc-start" style="margin-top:18px;padding:16px 28px;border-radius:14px;font-weight:800;text-transform:uppercase;">Démarrer le METCON</button>
      </div>
    `);
    wrap.querySelector('.dur-minus').onclick = ()=>{ st.duration = Math.max(b.durationMin*60, st.duration-300); renderPlayer(); };
    wrap.querySelector('.dur-plus').onclick = ()=>{ st.duration = Math.min(b.durationMax*60, st.duration+300); renderPlayer(); };
    wrap.querySelector('.mc-start').onclick = ()=>{ st.started = true; renderPlayer(); };
    mount.appendChild(wrap);
  } else {
    mountCountdown(mount, st.duration, { autoStart:!st.done, onDone: ()=>{ st.done = true; renderCounter(); } });
    const counterWrap = el(`<div></div>`);
    mount.appendChild(counterWrap);
    function renderCounter(){
      counterWrap.innerHTML='';
      counterWrap.appendChild(el(`
        <div class="round-counter-row">
          <button class="rc-btn rc-minus" ${st.rounds<=0?'disabled':''}>−</button>
          <div class="rc-val"><span class="n">${st.rounds}</span><span class="l">Tours</span></div>
          <button class="rc-btn rc-plus">+</button>
        </div>
      `));
      counterWrap.querySelector('.rc-plus').onclick = ()=>{ st.rounds++; renderCounter(); };
      counterWrap.querySelector('.rc-minus').onclick = ()=>{ st.rounds=Math.max(0,st.rounds-1); renderCounter(); };
    }
    renderCounter();
  }

  if(b.shareNote) container.appendChild(el(`<div class="block-note" style="margin-top:14px;font-style:italic;">Partage ton score et la charge utilisée dans le canal BenchMark !</div>`));

  bar.innerHTML = '';
  const canFinish = st.started;
  bar.appendChild(el(`<button class="btn-primary">${finishLabel(canFinish)}</button>`));
  bar.querySelector('button').onclick = ()=> nextBlock();
}

function renderFinisher(container, b, bar){
  renderBlockHeader(container, b);
  const key = 'f'+b.num;
  if(!state.blockState[key]) state.blockState[key] = { level:null, running:false, elapsed:0, timerId:null, done:false };
  const st = state.blockState[key];

  const levelWrap = el(`<div class="level-list"></div>`);
  b.levels.forEach(lv=>{
    const card = el(`
      <div class="level-card ${st.level===lv.name?'selected':''}">
        <div class="level-radio"></div>
        <div><div class="level-name">${lv.name}</div><div class="level-desc">${lv.desc}</div></div>
      </div>
    `);
    card.onclick = ()=>{ if(!st.running){ st.level = lv.name; renderPlayer(); } };
    levelWrap.appendChild(card);
  });
  container.appendChild(levelWrap);

  const sw = el(`
    <div class="stopwatch-box">
      <div class="stopwatch-digits">${fmtTime(st.elapsed)}</div>
      <div class="timer-controls">
        <button class="btn-secondary sw-reset">Réinitialiser</button>
        <button class="btn-primary sw-toggle">${st.running?'Pause':'Démarrer'}</button>
      </div>
    </div>
  `);
  const digits = sw.querySelector('.stopwatch-digits');
  const toggleBtn = sw.querySelector('.sw-toggle');
  toggleBtn.onclick = ()=>{
    if(!st.level) return;
    if(!st.running){
      st.running = true;
      if(st.elapsed===0) beeper.start();
      toggleBtn.textContent = 'Pause';
      st.timerId = setInterval(()=>{ st.elapsed++; digits.textContent = fmtTime(st.elapsed); }, 1000);
    } else {
      st.running = false;
      toggleBtn.textContent = 'Démarrer';
      clearInterval(st.timerId);
    }
  };
  sw.querySelector('.sw-reset').onclick = ()=>{
    st.running=false; st.elapsed=0; clearInterval(st.timerId);
    digits.textContent = fmtTime(0);
    toggleBtn.textContent = 'Démarrer';
  };
  container.appendChild(sw);

  bar.innerHTML = '';
  const canFinish = !!st.level;
  bar.appendChild(el(`<button class="btn-primary">${canFinish?'Terminer la séance →':'Passer et terminer →'}</button>`));
  bar.querySelector('button').onclick = ()=>{
    clearInterval(st.timerId);
    st.running = false;
    beeper.end();
    state.view='end';
    render();
  };
}

async function getCustomItems(sid){
  try{ const raw = await storageGet('custom-ex:'+sid); return raw?JSON.parse(raw):[]; }catch(e){ return []; }
}
async function setCustomItems(sid, items){
  await storageSet('custom-ex:'+sid, JSON.stringify(items));
}
async function getCustomCfg(sid){
  try{ const raw = await storageGet('custom-cfg:'+sid); return raw?JSON.parse(raw):{series:4, rest:90}; }catch(e){ return {series:4, rest:90}; }
}
async function setCustomCfg(sid, cfg){
  await storageSet('custom-cfg:'+sid, JSON.stringify(cfg));
}
function renderBlank(container, b, bar){
  renderBlockHeader(container, b);
  const sid = state.sessionId;
  const key = 'cu'+b.num;
  if(!state.blockState[key]) state.blockState[key] = { series:0 };
  const st = state.blockState[key];

  const mount = el(`<div class="custom-mount"><div style="text-align:center;color:var(--muted);padding:20px;">Chargement…</div></div>`);
  container.appendChild(mount);

  (async ()=>{
    let items = await getCustomItems(sid);
    let cfg = await getCustomCfg(sid);
    mount.innerHTML = '';

    if(!items.length){
      mount.appendChild(el(`
        <div style="text-align:center;margin-top:10px;padding:26px 20px;border:1px dashed var(--card-border);border-radius:16px;color:var(--muted);">
          <div style="font-size:28px;margin-bottom:8px;">✏️</div>
          <div style="font-weight:700;font-size:14px;color:var(--text);">Séance vide</div>
          <div style="font-size:13px;margin-top:6px;">Ajoute tes exercices ci-dessous.</div>
        </div>
      `));
    } else {
      const list = el(`<div class="ex-list"></div>`);
      const itemInputs = [];
      items.forEach((it, idx)=>{
        const row = el(`
          <div class="ex-row-wrap">
            <div class="ex-row">
              ${thumb(it.name)}
              <div class="ex-name">${it.name}</div>
              <div class="ex-detail">${it.detail||''}</div>
              <button class="hist-btn" title="Historique">${icon('history',16)}</button>

            </div>
            <div class="log-inputs">
              <input type="number" inputmode="decimal" class="log-w" placeholder="kg">
              <span>×</span>
              <input type="number" inputmode="numeric" class="log-r" placeholder="reps">
            </div>
          </div>
        `);
        const wInput = row.querySelector('.log-w');
        const rInput = row.querySelector('.log-r');
        getLastSet(it.name).then(last=>{ if(last){ wInput.placeholder = `${last.w} kg`; rInput.placeholder = `${last.r} reps`; } });
        row.querySelector('.hist-btn').onclick = ()=> openExerciseHistory(it.name);
        row.querySelector('.rm-btn').onclick = ()=>{
          confirmDialog(`Supprimer "${it.name}" de cette séance ?`, async ()=>{
            items.splice(idx,1);
            await setCustomItems(sid, items);
            renderPlayer();
          });
        };
        itemInputs.push({ name: it.name, wInput, rInput });
        list.appendChild(row);
      });
      mount.appendChild(list);
      wireThumbPhotos(list);

      const tracker = el(`
        <div class="series-tracker">
          <div class="st-count">${st.series}<span> / ${cfg.series}</span></div>
          <div class="st-label">Séries complétées</div>
          <div class="cfg-row">
            <span>Séries</span>
            <button class="cfg-btn cfg-minus" data-t="series">−</button><span class="cfg-val">${cfg.series}</span><button class="cfg-btn cfg-plus" data-t="series">+</button>
            <span>Repos</span>
            <button class="cfg-btn cfg-minus" data-t="rest">−</button><span class="cfg-val">${cfg.rest}s</span><button class="cfg-btn cfg-plus" data-t="rest">+</button>
          </div>
          <div class="series-btn-row">
            <button class="btn-secondary sb-minus" ${st.series<=0?'disabled':''}>−</button>
            <button class="btn-primary sb-plus" ${st.series>=cfg.series?'disabled':''}>Série terminée</button>
          </div>
        </div>
      `);
      tracker.querySelectorAll('.cfg-minus,.cfg-plus').forEach(btn=>{
        btn.onclick = async ()=>{
          const t = btn.dataset.t;
          const step = t==='rest' ? 15 : 1;
          const floor = t==='rest' ? 15 : 1;
          const delta = btn.classList.contains('cfg-plus') ? step : -step;
          cfg[t] = Math.max(floor, cfg[t]+delta);
          await setCustomCfg(sid, cfg);
          renderPlayer();
        };
      });
      tracker.querySelector('.sb-plus').onclick = async ()=>{
        let anyPR = false;
        for(const {name, wInput, rInput} of itemInputs){
          const w = parseFloat(wInput.value), r = parseInt(rInput.value, 10);
          if(w>0 && r>0){ const res = await logSet(name, w, r); if(res.isPR) anyPR = true; }
        }
        st.series = Math.min(cfg.series, st.series+1);
        if(anyPR) showPRToast();
        if(st.series < cfg.series) openRestTimer(cfg.rest, cfg.rest, ()=> renderPlayer());
        else renderPlayer();
      };
      tracker.querySelector('.sb-minus').onclick = ()=>{ st.series = Math.max(0, st.series-1); renderPlayer(); };
      mount.appendChild(tracker);
    }

    const addForm = el(`
      <div class="add-ex-form">
        <input type="text" class="add-ex-name" placeholder="Nom de l'exercice">
        <input type="text" class="add-ex-detail" placeholder="Détail (ex: 10-12 reps)">

      const detail = addForm.querySelector('.add-ex-detail').value.trim();
      if(!name) return;
      items.push({ name, detail });
      await setCustomItems(sid, items);
      renderPlayer();
    };
    mount.appendChild(addForm);
  })();

  bar.innerHTML = '';
  bar.appendChild(el(`<button class="btn-primary">Terminer la séance →</button>`));
  bar.querySelector('button').onclick = ()=>{ state.view='end'; render(); };
}

function renderEmom(container, b, bar){
  renderBlockHeader(container, b);
  const key = 'e'+b.num;
  if(!state.blockState[key]) state.blockState[key] = { started:false, minuteIndex:0, elapsedMinutes:0, done:false };
  const st = state.blockState[key];

  const list = el(`<div class="ex-list"></div>`);
  b.minutes.forEach(m=>{
    list.appendChild(el(`<div class="ex-row"><div class="ex-name">${m.label}</div><div class="ex-detail" style="white-space:normal;text-align:right;">${m.text}</div></div>`));
  });
  container.appendChild(list);
  container.appendChild(el(`<div class="block-note" style="margin-top:10px;">EMOM ${b.totalMinutes}' — motif de ${b.minutes.length} minute${b.minutes.length>1?'s':''} répété en boucle.</div>`));

  const mount = el(`<div></div>`);
  container.appendChild(mount);

  if(!st.started){
    const startWrap = el(`<div style="text-align:center;margin-top:18px;"><button class="btn-primary" style="padding:16px 28px;border-radius:14px;font-weight:800;text-transform:uppercase;">Démarrer l'EMOM ${b.totalMinutes}'</button></div>`);
    startWrap.querySelector('button').onclick = ()=>{ st.started = true; renderPlayer(); };

  } else if(!st.done){
    const current = b.minutes[st.minuteIndex % b.minutes.length];
    mount.appendChild(el(`
      <div style="text-align:center;margin-top:6px;">
        <div style="font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.08em;">Minute ${st.elapsedMinutes+1} / ${b.totalMinutes}</div>

      </div>
    `));

      st.elapsedMinutes++;
      st.minuteIndex++;
      if(st.elapsedMinutes >= b.totalMinutes) st.done = true;
      renderPlayer();
    }});

    mount.appendChild(el(`<div style="text-align:center;margin-top:20px;font-weight:800;color:var(--success-bright);">EMOM terminé 🎉</div>`));
  }

  bar.appendChild(el(`<button class="btn-primary">${finishLabel(canFinish)}</button>`));
  bar.querySelector('button').onclick = ()=> nextBlock();
}

/* ===================== PLAYER ===================== */
function isLastBlock(){
  const s = findSession(state.sessionId);
  return state.blockIndex === s.blocks.length-1;
}
function finishLabel(canFinish){
  if(isLastBlock()) return canFinish ? 'Terminer la séance →' : 'Passer et terminer →';
  return canFinish ? 'Bloc terminé →' : 'Passer ce bloc →';
}
function nextBlock(){
  const s = findSession(state.sessionId);
  if(state.blockIndex < s.blocks.length-1){
    state.blockIndex++;
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  } else {
    state.view = 'end';
    render();
  }
}
function prevBlock(){
  if(state.blockIndex > 0){ state.blockIndex--; render(); window.scrollTo({top:0,behavior:'smooth'}); }
  else { state.view='overview'; render(); }
}

function renderPlayer(){
  const s = findSession(state.sessionId);
  const b = s.blocks[state.blockIndex];
  app.innerHTML = '';
  app.appendChild(el(`
    <div class="topbar">
      <button class="back-btn">←</button>
      <div class="topbar-title"><div class="eyebrow">${s.title}</div><h1>${b.title}</h1></div>
      <button class="back-btn fullscreen-btn" title="Plein écran">${icon('fullscreen',18)}</button>
    </div>
  `));
  app.querySelector('.back-btn').onclick = prevBlock;
  app.querySelector('.fullscreen-btn').onclick = toggleFullscreen;
  app.appendChild(progressDots(s));
  const container = el(`<div class="player"></div>`);
  app.appendChild(container);
  const bar = el(`<div class="action-bar"></div>`);
  app.appendChild(bar);

  if(b.type==='mobility') renderMobility(container, b, bar);
  else if(b.type==='superset') renderSuperset(container, b, bar);
  else if(b.type==='circuit') renderCircuit(container, b, bar);
  else if(b.type==='amrap') renderAmrap(container, b, bar);
  else if(b.type==='metcon') renderMetcon(container, b, bar);
  else if(b.type==='finisher') renderFinisher(container, b, bar);
  else if(b.type==='blank') renderBlank(container, b, bar);
  else if(b.type==='note') renderNote(container, b, bar);
  else if(b.type==='emom') renderEmom(container, b, bar);
}

  app.appendChild(el(`
    <div class="brand">
      <div class="eyebrow">Brute Force KB</div>
      <h1>Stats</h1>

      <div class="bw-input-row">
        <input type="number" inputmode="decimal" class="bw-input" placeholder="kg">

      <div class="bw-latest"></div>

  app.appendChild(bwWrap);
  function paintBw(log){

    bwWrap.querySelector('.bw-latest').textContent = log.length ? `Dernière pesée : ${log[log.length-1].kg}kg (${log[log.length-1].d})` : 'Aucune pesée enregistrée.';

    input.value = '';

  };

  const gs = await computeGlobalStats();
  app.appendChild(el(`
    <div class="stats-grid">
      <div class="stats-tile"><div class="stv">${gs.totalSessions}</div><div class="stl">Séances validées</div></div>
      <div class="stats-tile"><div class="stv">${gs.totalVolume.toLocaleString('fr-FR')}</div><div class="stl">kg soulevés (total)</div></div>
      <div class="stats-tile"><div class="stv" style="font-size:15px;">${gs.mostTrained || '—'}</div><div class="stl">Exercice le plus travaillé</div></div>
    </div>
  `));

  app.appendChild(el(`<div class="stats-section-label">Programmes</div>`));
  const badgesWrap = el(`<div class="badges-wrap"></div>`);
  PROGRAMS.forEach(p=>{
    const sessions = [...p.trackA, ...p.trackB, ...p.trackC];
    const doneCount = sessions.filter(s=>completions[s.id]).length;
    const pct = Math.round((doneCount/sessions.length)*100);
    let completeWeeks = 0;
    for(let w=1; w<=8; w++){
      const ids = [p.trackA[w-1].id, p.trackB[w-1].id, p.trackC[w-1].id];
      if(ids.every(id=>completions[id])) completeWeeks++;
    }
    badgesWrap.appendChild(el(`
      <div class="badge-card">
        <div class="badge-icon">${pct===100?'🏆':p.icon}</div>
        <div class="badge-name">${p.name}</div>
        <div class="badge-detail">${completeWeeks}/8 semaines complètes · ${pct}%</div>
      </div>
    `));
  });
  app.appendChild(badgesWrap);

  const backBar = el(`<div class="action-bar"><button class="btn-secondary">Retour</button></div>`);
  backBar.querySelector('button').onclick = ()=>{ state.view='home'; render(); };
  app.appendChild(backBar);
}

async function renderEnd(){
  const s = findSession(state.sessionId);
  app.innerHTML = '';
  const already = completions[s.id];
  app.appendChild(el(`
    <div class="end-screen">
      <div class="end-badge">${icon('trophy',40)}</div>
      <h1>${s.title} terminée</h1>
      <p>Bien joué. ${already ? "Tu peux valider à nouveau cette séance pour la marquer comme faite aujourd'hui." : "Valide la séance pour l'enregistrer."}</p>
      <div class="rpe-row">
        <button class="rpe-btn" data-rpe="facile">😌<span>Facile</span></button>
        <button class="rpe-btn" data-rpe="correct">😐<span>Correct</span></button>
        <button class="rpe-btn" data-rpe="dur">🥵<span>Dur</span></button>
      </div>
      <textarea class="end-note" placeholder="Note rapide sur la séance (optionnel)"></textarea>
      <button class="validate-btn">Valider la séance</button>
      <button class="home-btn">Retour à l'accueil</button>
    </div>
  `));
  let selectedRpe = null;
  app.querySelectorAll('.rpe-btn').forEach(btn=>{
    btn.onclick = ()=>{
      app.querySelectorAll('.rpe-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedRpe = btn.dataset.rpe;
    };
  });
  const badge = app.querySelector('.end-badge');
  const validateBtn = app.querySelector('.validate-btn');
  validateBtn.onclick = async ()=>{
    validateBtn.disabled = true;
    celebrate(badge);
    beeper.end();
    const iso = new Date().toISOString();
    await setCompletion(s.id, iso);
    completions[s.id] = iso;
    await appendSessionLog({ id:s.id, date:iso, rpe:selectedRpe, note:app.querySelector('.end-note').value.trim() });
    const program = PROGRAMS.find(p=>[...p.trackA,...p.trackB,...p.trackC].some(x=>x.id===s.id));
    if(program){
      const sessions = [...program.trackA, ...program.trackB, ...program.trackC];
      if(sessions.every(x=>completions[x.id])){
        setTimeout(()=> showPRToast('🎉 Programme complet !'), 750);
      }
    }
    const wk = parseInt(s.id.match(/\d+$/)[0],10);
    setTimeout(()=>{
      state.view='home'; state.openWeek = wk;
      render();
    }, 700);
  };
  app.querySelector('.home-btn').onclick = ()=>{ state.view='home'; render(); };
}
function celebrate(badge){
  badge.classList.remove('pop'); void badge.offsetWidth; badge.classList.add('pop');
  const colors = ['#E8A947','#96BC77','#8FB0BF','#E85C2E','#E0B34A'];
  for(let i=0;i<16;i++){
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const angle = (Math.PI*2*i)/16 + (Math.random()*0.4-0.2);
    const dist = 60 + Math.random()*50;
    piece.style.setProperty('--tx', `${Math.cos(angle)*dist}px`);
    piece.style.setProperty('--ty', `${Math.sin(angle)*dist}px`);
    piece.style.setProperty('--rot', `${Math.random()*360}deg`);
    piece.style.background = colors[i % colors.length];
    piece.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
    badge.appendChild(piece);
    setTimeout(()=> piece.remove(), 900);
  }
}

/* ===================== SPOTIFY WIDGET (persistent, outside render cycle) ===================== */
function toSpotifyEmbedUrl(url){
  try{
    const u = new URL(url.trim());
    if(!/spotify\.com$/.test(u.hostname) && !u.hostname.endsWith('.spotify.com')) return null;
    const parts = u.pathname.split('/').filter(Boolean);
    const types = ['playlist','track','album','artist','show','episode'];
    const idx = parts.findIndex(p=>types.includes(p));
    if(idx>=0 && parts[idx+1]) return `https://open.spotify.com/embed/${parts[idx]}/${parts[idx+1]}`;
  }catch(e){}
  return null;
}
/* ===================== SPOTIFY WIDGET (persistent, outside render cycle) ===================== */
function toSpotifyEmbedUrl(url){
  try{
    const u = new URL(url.trim());
    if(!/spotify\.com$/.test(u.hostname) && !u.hostname.endsWith('.spotify.com')) return null;
    const parts = u.pathname.split('/').filter(Boolean);
    const types = ['playlist','track','album','artist','show','episode'];
    const idx = parts.findIndex(p=>types.includes(p));
    if(idx>=0 && parts[idx+1]) return `https://open.spotify.com/embed/${parts[idx]}/${parts[idx+1]}`;
  }catch(e){}
  return null;
}

/* ---- Spotify OAuth (Authorization Code + PKCE, no server/secret needed) ---- */
const SPOTIFY_SCOPES = 'user-read-playback-state user-modify-playback-state user-read-currently-playing';
function spotifyRandomString(len){
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let out = '';
  for(let i=0;i<len;i++) out += chars.charAt(Math.floor(Math.random()*chars.length));
  return out;
}
function spotifyBase64url(buffer){
  return btoa(String.fromCharCode(...new Uint8Array(buffer))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
async function spotifyCodeChallenge(verifier){
  const data = new TextEncoder().encode(verifier);
  const hashed = await crypto.subtle.digest('SHA-256', data);
  return spotifyBase64url(hashed);
}
function spotifyRedirectUri(){
  return location.href.split('?')[0].split('#')[0];
}
async function spotifyLogin(){
  const clientId = (await storageGet('spotify-client-id') || '').trim();
  if(!clientId){ alert("Ajoute d'abord ton Client ID Spotify ci-dessus."); return; }
  const verifier = spotifyRandomString(64);
  await storageSet('spotify-pkce-verifier', verifier);
  const challenge = await spotifyCodeChallenge(verifier);
  const params = new URLSearchParams({
    client_id: clientId, response_type: 'code', redirect_uri: spotifyRedirectUri(),
    scope: SPOTIFY_SCOPES, code_challenge_method: 'S256', code_challenge: challenge
  });
  window.location.href = 'https://accounts.spotify.com/authorize?' + params.toString();
}
async function spotifyLogout(){
  await storageDelete('spotify-access-token');
  await storageDelete('spotify-refresh-token');
  await storageDelete('spotify-token-expiry');
}
async function spotifyHandleCallback(){
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if(!code) return;
  const verifier = await storageGet('spotify-pkce-verifier');
  const clientId = (await storageGet('spotify-client-id') || '').trim();
  window.history.replaceState({}, document.title, location.pathname);
  if(!verifier || !clientId) return;
  try{
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({ client_id:clientId, grant_type:'authorization_code', code,
        redirect_uri: spotifyRedirectUri(), code_verifier: verifier })
    });
    const data = await res.json();
    if(data.access_token){
      await storageSet('spotify-access-token', data.access_token);
      await storageSet('spotify-refresh-token', data.refresh_token);
      await storageSet('spotify-token-expiry', String(Date.now() + data.expires_in*1000));
    }
  }catch(e){}
}
async function spotifyGetValidToken(){
  const expiry = parseInt((await storageGet('spotify-token-expiry')) || '0', 10);
  const token = await storageGet('spotify-access-token');
  if(token && Date.now() < expiry - 60000) return token;
  const refresh = await storageGet('spotify-refresh-token');
  const clientId = (await storageGet('spotify-client-id') || '').trim();
  if(!refresh || !clientId) return null;
  try{
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({ client_id:clientId, grant_type:'refresh_token', refresh_token:refresh })
    });
    const data = await res.json();
    if(data.access_token){
      await storageSet('spotify-access-token', data.access_token);
      await storageSet('spotify-token-expiry', String(Date.now() + data.expires_in*1000));
      if(data.refresh_token) await storageSet('spotify-refresh-token', data.refresh_token);
      return data.access_token;
    }
  }catch(e){}
  return null;
}
async function spotifyPlayerAction(action){
  const token = await spotifyGetValidToken();
  if(!token) return {error:'not-authed'};
  const methodMap = {play:'PUT', pause:'PUT', next:'POST', previous:'POST'};
  try{
    const res = await fetch(`https://api.spotify.com/v1/me/player/${action}`, { method: methodMap[action], headers:{Authorization:`Bearer ${token}`} });
    if(res.status===204 || res.status===200) return {ok:true};
    if(res.status===403) return {error:'premium-required'};
    if(res.status===404) return {error:'no-active-device'};
    return {error:'unknown'};
  }catch(e){ return {error:'network'}; }
}

/* ===================== LOAD CALCULATOR (Gilet + KB) ===================== */
async function initCalcWidget(){
  const dock = document.createElement('div');
  dock.className = 'calc-dock';
  dock.innerHTML = `
    <button class="calc-fab" title="Calculateur de charge">${icon('calc',24)}</button>
    <div class="calc-panel hidden">
      <button class="calc-close">${icon('close',16)}</button>
      <h4>Calculateur de charge</h4>
      <div class="calc-row">
        <label>Poids total visé (kg)</label>
        <input type="number" inputmode="decimal" class="calc-total" placeholder="ex: 40">
      </div>
      <div class="calc-row">
        <label>Poids du gilet (kg)</label>
        <input type="number" inputmode="decimal" class="calc-vest" placeholder="ex: 20">
      </div>
      <div class="calc-result"></div>
    </div>
  `;
  document.body.appendChild(dock);
  const fab = dock.querySelector('.calc-fab');
  const panel = dock.querySelector('.calc-panel');
  const totalInput = dock.querySelector('.calc-total');
  const vestInput = dock.querySelector('.calc-vest');
  const result = dock.querySelector('.calc-result');

  fab.onclick = ()=> panel.classList.toggle('hidden');
  dock.querySelector('.calc-close').onclick = ()=> panel.classList.add('hidden');

  const savedVest = await storageGet('calc-vest');
  if(savedVest) vestInput.value = savedVest;

  function compute(){
    const total = parseFloat(totalInput.value);
    const vest = parseFloat(vestInput.value);
    if(!(total>0) || !(vest>=0)){ result.innerHTML = ''; return; }
    const kb = Math.round((total-vest)*10)/10;
    if(kb < 0){
      result.innerHTML = `<div class="calc-warn">Le gilet dépasse déjà le poids total visé.</div>`;
    } else {
      result.innerHTML = `<div class="calc-kb-val">${kb}<span> kg de kettlebell</span></div>`;
    }
    storageSet('calc-vest', vestInput.value);
  }
  totalInput.oninput = compute;
  vestInput.oninput = compute;
}

async function initSpotifyWidget(){
  await spotifyHandleCallback();

  const dock = document.createElement('div');
  dock.className = 'spotify-dock';
  dock.innerHTML = `
    <button class="spotify-fab" title="Musique">${icon('music',22)}</button>
    <div class="spotify-panel hidden">
      <button class="spotify-close">${icon('close',16)}</button>
      <h4>Musique — Spotify</h4>

      <div class="spotify-account-mount"></div>

      <div class="spotify-section-label">Ou colle un lien (sans compte)</div>
      <div class="spotify-input-row">
        <input type="text" placeholder="Lien playlist / album / titre" />
        <button class="spotify-load">Charger</button>
      </div>
      <div class="spotify-embed-mount"></div>
    </div>
  `;
  document.body.appendChild(dock);
  const fab = dock.querySelector('.spotify-fab');
  const panel = dock.querySelector('.spotify-panel');
  const input = dock.querySelector('input');
  const mount = dock.querySelector('.spotify-embed-mount');
  const accountMount = dock.querySelector('.spotify-account-mount');

  fab.onclick = ()=> panel.classList.toggle('hidden');
  dock.querySelector('.spotify-close').onclick = ()=> panel.classList.add('hidden');

  function mountEmbed(embedUrl){
    mount.innerHTML = `<iframe src="${embedUrl}" width="100%" height="152" frameborder="0"
      allow="encrypted-media; autoplay; clipboard-write; fullscreen; picture-in-picture" loading="lazy"></iframe>`;
  }
  try{
    const saved = await storageGet('spotify-link');
    if(saved){
      input.value = saved;
      const embed = toSpotifyEmbedUrl(saved);
      if(embed) mountEmbed(embed);
    }
  }catch(e){}
  dock.querySelector('.spotify-load').onclick = async ()=>{
    const embed = toSpotifyEmbedUrl(input.value);
    if(!embed){ input.style.borderColor = 'var(--ember)'; return; }
    input.style.borderColor = '';
    mountEmbed(embed);
    try{ await storageSet('spotify-link', input.value.trim()); }catch(e){}
  };

  async function renderAccountSection(){
    const token = await storageGet('spotify-access-token');
    const clientId = (await storageGet('spotify-client-id')) || '';
    if(token){
      accountMount.innerHTML = `
        <div class="spotify-connected">
          <span>✓ Connecté à Spotify</span>
          <button class="spotify-logout">Déconnecter</button>
        </div>
        <div class="spotify-controls">
          <button data-a="previous">⏮</button>
          <button data-a="play" class="spotify-play-main">▶</button>
          <button data-a="pause">⏸</button>
          <button data-a="next">⏭</button>
        </div>
        <div class="spotify-status"></div>
      `;
      const status = accountMount.querySelector('.spotify-status');
      accountMount.querySelector('.spotify-logout').onclick = async ()=>{ await spotifyLogout(); renderAccountSection(); };
      accountMount.querySelectorAll('.spotify-controls button').forEach(btn=>{
        btn.onclick = async ()=>{
          status.textContent = '…';
          const r = await spotifyPlayerAction(btn.dataset.a);
          if(r.ok) status.textContent = '';
          else if(r.error==='premium-required') status.textContent = 'Nécessite Spotify Premium.';
          else if(r.error==='no-active-device') status.textContent = "Ouvre Spotify et lance un titre d'abord.";
          else if(r.error==='not-authed') { status.textContent = 'Session expirée, reconnecte-toi.'; renderAccountSection(); }
          else status.textContent = 'Erreur de connexion à Spotify.';
        };
      });
    } else {
      accountMount.innerHTML = `
        <details class="spotify-setup">
          <summary>Configurer la connexion Spotify</summary>
          <p>1. Va sur <b>developer.spotify.com/dashboard</b>, crée une app (gratuit).<br>
          2. Dans ses réglages, ajoute exactement cette Redirect URI :<br>
          <code class="spotify-redirect-uri"></code><br>
          3. Colle ci-dessous le <b>Client ID</b> affiché sur ta app.</p>
          <div class="spotify-input-row">
            <input type="text" class="spotify-clientid-input" placeholder="Client ID Spotify" />
            <button class="spotify-save-clientid">OK</button>
          </div>
        </details>
        <button class="spotify-login-btn" ${clientId?'':'disabled'}>Se connecter à Spotify</button>
      `;
      accountMount.querySelector('.spotify-redirect-uri').textContent = spotifyRedirectUri();
      const clientIdInput = accountMount.querySelector('.spotify-clientid-input');
      clientIdInput.value = clientId;
      accountMount.querySelector('.spotify-save-clientid').onclick = async ()=>{
        await storageSet('spotify-client-id', clientIdInput.value.trim());
        renderAccountSection();
      };
      const loginBtn = accountMount.querySelector('.spotify-login-btn');
      loginBtn.onclick = spotifyLogin;
    }
  }
  renderAccountSection();
}
initSpotifyWidget();
initCalcWidget();

/* ===================== WAKE LOCK (keep screen on during a session) ===================== */
let wakeLock = null;
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator && !wakeLock){
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', ()=>{ wakeLock = null; });
    }
  }catch(e){}
}
function releaseWakeLock(){
  try{ wakeLock && wakeLock.release(); }catch(e){}
  wakeLock = null;
}
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState === 'visible' && state.view === 'player') requestWakeLock();
});
function toggleFullscreen(){
  try{
    if(!document.fullscreenElement){
      (document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen || function(){}).call(document.documentElement);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document);
    }
  }catch(e){}
}

/* ===================== ROUTER ===================== */
async function render(){
  if(state.view === 'player') requestWakeLock(); else releaseWakeLock();
  if(state.view==='home') await renderHome();
  else if(state.view==='overview') renderOverview();
  else if(state.view==='player') renderPlayer();
  else if(state.view==='end') await renderEnd();
  else if(state.view==='stats') await renderStats();
  app.classList.remove('view-fade'); void app.offsetWidth; app.classList.add('view-fade');
}
render();
</script>
